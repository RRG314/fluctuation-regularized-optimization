name: Bug report
description: Report a reproducible bug in the code, tests, examples, or docs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include exact commands and minimal code where possible.
      value: |
        ```bash

        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.15"
  - type: input
    id: torch
    attributes:
      label: PyTorch version
      placeholder: "2.13.0"
  - type: textarea
    id: context
    attributes:
      label: Additional context
